name: Peptide
options:
  bundleIdPrefix: com.peptideapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

settings:
  base:
    # Bundle ID lives in signing.local.xcconfig so each developer can use
    # their own (Personal Team profiles require globally-unique bundle IDs).
    PRODUCT_BUNDLE_IDENTIFIER: "$(LOCAL_BUNDLE_ID)"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "1"
    UIRequiresFullScreen: YES
    INFOPLIST_FILE: Supporting/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Auto-managed code signing. The team ID lives in `signing.local.xcconfig`
    # (gitignored), so each developer can use their own Personal Team without
    # stepping on each other. If signing.local.xcconfig is missing, xcodebuild
    # will yell at you to "select a development team" — copy
    # signing.local.xcconfig.example to signing.local.xcconfig and put your
    # 10-character team ID in it.
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: "$(LOCAL_DEVELOPMENT_TEAM)"

configFiles:
  Debug: signing.local.xcconfig
  Release: signing.local.xcconfig

targets:
  Peptide:
    type: application
    platform: iOS
    entitlements:
      path: Supporting/Pepper.entitlements
    sources:
      - path: Sources
      - path: Resources
      - path: Supporting
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: Pepper Auth
            CFBundleURLSchemes:
              - pepper
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        NSCameraUsageDescription: "Used to scan food barcodes and photograph meals"
        NSMicrophoneUsageDescription: "Used so you can say compound names instead of typing them."
        NSSpeechRecognitionUsageDescription: "Used to recognize compound names you speak so they get auto-selected."
        NSPhotoLibraryUsageDescription: "Used to select meal photos for macro estimation"
        CFBundleDisplayName: "Pepper"
    dependencies:
      - package: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: Lottie
        product: Lottie
      - package: PostHog
        product: PostHog
      - sdk: AppIntents.framework
    scheme:
      testTargets:
        - PeptideTests

  PeptideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Peptide
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Peptide.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Peptide"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: "3.0.0"
