name: Peptide
options:
  bundleIdPrefix: com.peptideapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.peptideapp.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "1"
    UIRequiresFullScreen: YES
    INFOPLIST_FILE: Supporting/Info.plist

targets:
  Peptide:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
      - path: Supporting
    info:
      path: Supporting/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        NSCameraUsageDescription: "Used to scan food barcodes"
        CFBundleDisplayName: "Pepper"
    dependencies:
      - package: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: Lottie
        product: Lottie
      - package: PostHog
        product: PostHog
    scheme:
      testTargets: []

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: "3.0.0"
